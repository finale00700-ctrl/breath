<title>음악 호흡 훈련</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: -apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background: #080e18;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}

.app {
  width: 360px;
  background: linear-gradient(160deg,#0c1828,#091e30 50%,#0b2218);
  border-radius: 24px;
  padding: 28px 20px 22px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}

/* 별 */
.stars { position:absolute; inset:0; pointer-events:none; }
.star {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.7);
  animation: twinkle var(--d,3s) ease-in-out infinite alternate;
}
@keyframes twinkle { from{opacity:.1} to{opacity:.9} }

/* 헤더 */
.title { font-size:16px; font-weight:600; color:rgba(255,255,255,.9); z-index:1; }
.guide { font-size:11px; color:rgba(255,255,255,.38); z-index:1; }

/* 나비 */
.stage {
  position:relative; width:220px; height:210px;
  display:flex; align-items:center; justify-content:center;
  z-index:1;
}
.wing-l, .wing-r {
  position:absolute; top:50%;
  transform-origin: right center;
  transform: translateY(-50%) scaleX(0.15);
  transition: filter .1s;
}
.wing-r { transform-origin: left center; transform: translateY(-50%) scaleX(0.15); }

/* 텍스트 오버레이 */
.breath-box {
  position:absolute; bottom:-8px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; z-index:10;
}
.b-en  { font-size:14px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.9); text-transform:uppercase; }
.b-kr  { font-size:11px; color:rgba(160,235,210,.6); margin-top:1px; }
.b-num { font-size:30px; font-weight:200; color:#fff; font-variant-numeric:tabular-nums; margin-top:2px; }

/* 파형 */
.wave-wrap { width:100%; max-width:300px; height:44px; z-index:1; }
canvas { width:100%; height:100%; }

/* 진행바 */
.prog-wrap { width:100%; max-width:300px; z-index:1; }
.prog-bg { height:3px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; width:0%; background:linear-gradient(90deg,rgba(40,180,140,.7),rgba(100,220,180,.95)); border-radius:2px; transition:width 1s linear; }
.prog-label { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,.28); margin-top:4px; }

/* 섹션 라벨 */
.sec-label { font-size:11px; color:rgba(255,255,255,.32); width:100%; max-width:300px; z-index:1; }

/* 모드 버튼 */
.mode-row { display:flex; gap:8px; width:100%; max-width:300px; z-index:1; }
.mode-btn {
  flex:1; padding:8px 4px; border-radius:9px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.45); font-size:12px;
  cursor:pointer; font-family:inherit; text-align:center; transition:all .2s;
}
.mode-btn span { display:block; }
.mode-btn .mn { font-weight:600; }
.mode-btn .md { font-size:10px; opacity:.65; margin-top:2px; }
.mode-btn.on { border-color:rgba(60,200,155,.55); background:rgba(20,140,100,.2); color:rgba(120,235,200,.95); }

/* 시간 버튼 */
.time-row { display:flex; gap:8px; width:100%; max-width:300px; z-index:1; }
.time-btn {
  flex:1; padding:7px 0; border-radius:9px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.45); font-size:13px;
  cursor:pointer; font-family:inherit; transition:all .2s;
}
.time-btn.on { border-color:rgba(60,200,155,.55); background:rgba(20,140,100,.2); color:rgba(120,235,200,.95); font-weight:600; }

/* 컨트롤 버튼 */
.ctrl-row { display:flex; gap:10px; width:100%; max-width:300px; z-index:1; }
.btn-start {
  flex:1; padding:13px; border-radius:11px;
  border:1px solid rgba(60,200,155,.5);
  background:rgba(16,120,88,.28); color:rgba(150,240,205,.95);
  font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
}
.btn-stop {
  padding:13px 16px; border-radius:11px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04); color:rgba(255,255,255,.38);
  font-size:13px; cursor:pointer; font-family:inherit; display:none;
}
.btn-stop.show { display:block; }

.note { font-size:10px; color:rgba(255,255,255,.2); text-align:center; max-width:260px; line-height:1.6; z-index:1; }

/* 완료 오버레이 */
.done-overlay {
  position:absolute; inset:0; background:rgba(3,12,10,.92);
  border-radius:24px; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:20;
}
.done-overlay.show { display:flex; }
.done-icon { font-size:44px; animation:pop .6s ease; }
@keyframes pop { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
.done-title { font-size:21px; font-weight:600; color:rgba(140,238,205,.95); }
.done-msg { font-size:13px; color:rgba(255,255,255,.45); text-align:center; max-width:230px; line-height:1.8; }
.done-close {
  padding:10px 28px; border-radius:9px;
  border:1px solid rgba(60,200,155,.4); background:rgba(16,110,80,.25);
  color:rgba(130,232,195,.9); font-size:14px; cursor:pointer; font-family:inherit;
}
</style>

  <div class="ctrl-row">
    <button class="btn-start" id="btnStart" onclick="startSession()">훈련 시작</button>
    <button class="btn-stop" id="btnStop" onclick="stopSession()">중단</button>
  </div>

  <div class="note">소리 보상 시스템: 리듬에 익숙해질수록 음악이 더욱 풍성해집니다</div>
</div>

<script>
/* ====================================================
   전역 상태
   ==================================================== */
var mode        = '478';
var totalMin    = 3;
var running     = false;
var sesTimer    = null;
var breathTimer = null;
var elSec       = 0;
var phaseIdx    = 0;
var fbLevel     = 0;
var waveOff     = 0;

var MODES = {
  resonance: [
    { en:'Inhale', kr:'들이마시기', dur:5.5, dir:'inhale' },
    { en:'Exhale', kr:'내쉬기',    dur:5.5, dir:'exhale' }
  ],
  '478': [
    { en:'Inhale', kr:'들이마시기', dur:4, dir:'inhale' },
    { en:'Hold',   kr:'참기',      dur:7, dir:'hold'   },
    { en:'Exhale', kr:'내쉬기',    dur:8, dir:'exhale' }
  ]
};

/* ====================================================
   별
   ==================================================== */
(function(){
  var el = document.getElementById('stars');
  for(var i=0;i<60;i++){
    var s=document.createElement('div'); s.className='star';
    var sz=(Math.random()*1.8+0.6).toFixed(1);
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100).toFixed(1)+'%;left:'+(Math.random()*100).toFixed(1)+'%;--d:'+(Math.random()*3+1.8).toFixed(1)+'s;animation-delay:'+(Math.random()*5).toFixed(1)+'s';
    el.appendChild(s);
  }
})();

/* ====================================================
   날개
   ==================================================== */
var wL = document.getElementById('wL');
var wR = document.getElementById('wR');

function setWings(scale){
  var sc = Math.max(0.08, Math.min(1, scale));
  wL.style.transform = 'translateY(-50%) scaleX('+sc+')';
  wR.style.transform = 'translateY(-50%) scaleX('+sc+')';
  var glow = Math.round(sc * 24);
  var alpha = (0.06 + sc * 0.26).toFixed(2);
  var f = 'drop-shadow(0 0 '+glow+'px rgba(140,80,255,'+alpha+'))';
  wL.style.filter = f;
  wR.style.filter = f;
}
setWings(0.15);

function wingForPhase(dir, progress){
  if(dir === 'hold') return 1.0;            // 완전 펼침 고정
  var t = dir==='inhale' ? progress : 1-progress;
  // ease in-out
  return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
}

/* ====================================================
   오디오
   ==================================================== */
var AC=null, masterG=null, noiseG=null, droneList=[];

function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  masterG = AC.createGain(); masterG.gain.value=0.001; masterG.connect(AC.destination);

  // 드론 화음
  var freqs=[65.41,98.00,130.81,164.81,196.00];
  var gains=[0.22,0.14,0.16,0.10,0.09];
  freqs.forEach(function(freq,i){
    var osc=AC.createOscillator(), g=AC.createGain();
    osc.type = i<2?'sine':'triangle';
    osc.frequency.value = freq;
    g.gain.value = gains[i];
    var lfo=AC.createOscillator(), lg=AC.createGain();
    lfo.frequency.value=0.12+i*0.05; lg.gain.value=0.2;
    lfo.connect(lg); lg.connect(osc.frequency); lfo.start();
    osc.connect(g); g.connect(masterG); osc.start();
    droneList.push({osc:osc, base:freq});
  });

  // 바이노럴 비트 10Hz
  var mg=AC.createChannelMerger(2); mg.connect(masterG);
  [[200,0],[210,1]].forEach(function(p){
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=p[0]; g.gain.value=0.05;
    o.connect(g); g.connect(mg,0,p[1]); o.start();
  });

  // 화이트 노이즈
  var len=AC.sampleRate*3;
  var buf=AC.createBuffer(1,len,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
  var ns=AC.createBufferSource(); ns.buffer=buf; ns.loop=true;
  var nf=AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=500;
  noiseG=AC.createGain(); noiseG.gain.value=0.07;
  ns.connect(nf); nf.connect(noiseG); noiseG.connect(masterG); ns.start();
}

function soundForPhase(dir, dur){
  if(!AC||!masterG) return;
  var now=AC.currentTime, end=now+dur;
  var tgt = dir==='inhale' ? 0.72 : dir==='exhale' ? 0.12 : 0.50;
  masterG.gain.cancelScheduledValues(now);
  masterG.gain.setValueAtTime(masterG.gain.value, now);
  masterG.gain.linearRampToValueAtTime(tgt, dir==='hold' ? now+0.4 : end);

  droneList.forEach(function(d){
    var mult = dir==='inhale' ? 1.006 : dir==='exhale' ? 0.999 : 1.0;
    d.osc.frequency.cancelScheduledValues(now);
    d.osc.frequency.setValueAtTime(d.osc.frequency.value, now);
    d.osc.frequency.linearRampToValueAtTime(d.base*mult, end);
  });

  var nTgt = Math.max(0.003, 0.07 - fbLevel*0.065);
  noiseG.gain.cancelScheduledValues(now);
  noiseG.gain.setValueAtTime(noiseG.gain.value, now);
  noiseG.gain.linearRampToValueAtTime(nTgt, end);
}

function fadeOut(dur){
  if(!AC||!masterG) return;
  var now=AC.currentTime;
  masterG.gain.cancelScheduledValues(now);
  masterG.gain.setValueAtTime(masterG.gain.value,now);
  masterG.gain.linearRampToValueAtTime(0.0001, now+dur);
}

function singingBowl(){
  if(!AC) return;
  [432,648,864,1296].forEach(function(f,i){
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=f;
    var t=AC.currentTime;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.22/(i+1), t+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t+4);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(t+4.1);
  });
}

/* ====================================================
   음성
   ==================================================== */
function speak(txt){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US'; u.rate=0.62; u.pitch=0.95; u.volume=1.0;
  var vv=window.speechSynthesis.getVoices();
  var pick=vv.filter(function(v){return v.lang.startsWith('en');});
  var female=pick.find(function(v){return /samantha|karen|moira|victoria|zira/i.test(v.name);});
  u.voice = female||pick[0]||null;
  window.speechSynthesis.speak(u);
}
// 미리 목록 로드
if(window.speechSynthesis) window.speechSynthesis.getVoices();

/* ====================================================
   파형 캔버스
   ==================================================== */
var wc=document.getElementById('waveC');
var wx=wc.getContext('2d');
wc.width=300; wc.height=44;

(function loopWave(){
  wx.clearRect(0,0,300,44);
  var amp=running?(8+fbLevel*10):3;
  waveOff += running?0.04:0.01;
  for(var w=0;w<3;w++){
    wx.beginPath();
    var al=running?[0.6,0.28,0.12][w]:[0.15,0.07,0.03][w];
    var ps=w*0.95, am=1-w*0.28;
    wx.strokeStyle='rgba(140,80,255,'+al+')';
    wx.lineWidth=w===0?1.5:1;
    for(var x=0;x<=300;x+=2){
      var y=22+amp*am*Math.sin(x*0.028+waveOff+ps)+amp*0.36*am*Math.sin(x*0.058+waveOff*1.35+ps);
      x===0?wx.moveTo(x,y):wx.lineTo(x,y);
    }
    wx.stroke();
  }
  requestAnimationFrame(loopWave);
})();

/* ====================================================
   유틸
   ==================================================== */
function fmt(s){
  return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');
}

/* ====================================================
   컨트롤
   ==================================================== */
window.pickMode=function(m,btn){
  if(running) return;
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
};

window.pickTime=function(t,btn){
  if(running) return;
  totalMin=t;
  document.querySelectorAll('.time-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('total').textContent=fmt(t*60);
};

/* ====================================================
   호흡 사이클
   ==================================================== */
function runCycle(){
  clearInterval(breathTimer);
  var phases=MODES[mode];
  phaseIdx=phaseIdx%phases.length;
  var ph=phases[phaseIdx];

  document.getElementById('bEn').textContent=ph.en;
  document.getElementById('bKr').textContent=ph.kr;
  soundForPhase(ph.dir, ph.dur);
  speak(ph.en);

  var elapsed=0;
  setWings(wingForPhase(ph.dir,0));

  breathTimer=setInterval(function(){
    elapsed+=0.1;
    var rem=Math.max(0,ph.dur-elapsed);
    document.getElementById('bNum').textContent=rem.toFixed(1);
    setWings(wingForPhase(ph.dir, Math.min(1,elapsed/ph.dur)));
    if(elapsed>=ph.dur){
      clearInterval(breathTimer);
      phaseIdx=(phaseIdx+1)%phases.length;
      runCycle();
    }
  },100);
}

/* ====================================================
   세션
   ==================================================== */
window.startSession=function(){
  if(running) return;
  initAudio();
  if(AC.state==='suspended') AC.resume();

  running=true; elSec=0; fbLevel=0; phaseIdx=0;
  document.getElementById('total').textContent=fmt(totalMin*60);
  document.getElementById('elapsed').textContent='0:00';
  document.getElementById('progFill').style.width='0%';

  var bs=document.getElementById('btnStart');
  bs.textContent='진행 중…'; bs.style.opacity='0.5'; bs.style.cursor='default';
  document.getElementById('btnStop').classList.add('show');

  runCycle();

  sesTimer=setInterval(function(){
    elSec++;
    var tot=totalMin*60;
    document.getElementById('elapsed').textContent=fmt(elSec);
    document.getElementById('progFill').style.width=Math.min(100,(elSec/tot*100)).toFixed(1)+'%';
    fbLevel=Math.min(1,elSec/(tot*0.65));
    if(elSec>=tot) finishSession();
  },1000);
};

window.stopSession=function(){
  running=false;
  clearInterval(sesTimer); clearInterval(breathTimer);
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  fadeOut(0.8);
  setWings(0.15);
  document.getElementById('bEn').textContent='Ready';
  document.getElementById('bKr').textContent='';
  document.getElementById('bNum').textContent='—';
  var bs=document.getElementById('btnStart');
  bs.textContent='훈련 시작'; bs.style.opacity=''; bs.style.cursor='';
  document.getElementById('btnStop').classList.remove('show');
  document.getElementById('progFill').style.width='0%';
  document.getElementById('elapsed').textContent='0:00';
  fbLevel=0;
};

function finishSession(){
  running=false;
  clearInterval(sesTimer); clearInterval(breathTimer);
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  fadeOut(1.2);
  setTimeout(singingBowl,700);

  var bs=document.getElementById('btnStart');
  bs.textContent='훈련 시작'; bs.style.opacity=''; bs.style.cursor='';
  document.getElementById('btnStop').classList.remove('show');
  setWings(1.0);
  document.getElementById('bEn').textContent='Done';
  document.getElementById('bKr').textContent='완료';
  document.getElementById('bNum').textContent='✓';

  var msgs={
    resonance:'공명 호흡이 완료되었습니다.<br>알파파 상태로 진입했습니다.',
    '478':'수면 호흡이 완료되었습니다.<br>부교감신경이 활성화되어<br>깊은 이완 상태입니다.'
  };
  document.getElementById('doneMsg').innerHTML=msgs[mode];
  document.getElementById('doneOverlay').classList.add('show');
}

document.getElementById('doneClose').onclick=function(){
  document.getElementById('doneOverlay').classList.remove('show');
  window.stopSession();
};

// 초기값 세팅
document.getElementById('total').textContent=fmt(totalMin*60);
</script>


</body></html>
